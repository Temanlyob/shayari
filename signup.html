<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shayroo - Sign Up</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

    <div class="top-bar">
        <div class="logo">Shayroo</div>
    </div>

    <div class="signup-container">

        <h1>Create Account</h1>

        <p class="subtitle">
            Join the Shayroo community
        </p>

        <input type="text" placeholder="Full Name" class="input-field">

        <input type="text" placeholder="Username" class="input-field">

        <input type="email" placeholder="Email Address" class="input-field">

        <input type="password" placeholder="Password" class="input-field">

        <input type="password" placeholder="Confirm Password" class="input-field">

        <button class="signup-btn">
            Create Account
        </button>

        <div class="divider">
            OR
        </div>

        <button class="google-btn">
            Continue with Google
        </button>

        <button class="facebook-btn">
            Continue with Facebook
        </button>

        <div class="login-section">

            <p>Already have an account?</p>

            <a href="profile.html">
                Log In
            </a>

        </div>

    </div>

</body>
</html>
