<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shayroo - My Account</title>
    <link rel="stylesheet" href="account.css">
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo">Shayroo</div>
    </div>

    <!-- Profile Section -->
    <div class="profile-section">

        <img src="https://via.placeholder.com/120" class="profile-pic">

        <h2>@rahul</h2>

        <p class="bio">
            Shayari Lover ❤️ | Dil ki baat alfaazon mein.
        </p>

        <button class="edit-btn">
            Edit Profile
        </button>

        <div class="stats">

            <div class="stat">
                <h3>25</h3>
                <span>Posts</span>
            </div>

            <div class="stat">
                <h3>1.2K</h3>
                <span>Followers</span>
            </div>

            <div class="stat">
                <h3>180</h3>
                <span>Following</span>
            </div>

        </div>

    </div>

    <!-- New Post Button -->

    <button class="new-post-btn">
        ＋ New Shayari
    </button>

    <!-- User Posts -->

    <div class="post-card">

        <div class="post-text">
            Tu mile ya na mile,<br>
            Ye kismat ki baat hai,<br>
            Hum koshish bhi na kare,<br>
            Ye galat baat hai.
        </div>

        <div class="post-actions">
            <button>❤️ 120</button>
            <button>💬 24</button>
            <button>📤 Share</button>
        </div>

    </div>

    <div class="post-card">

        <div class="post-text">
            Har khushi me tera naam ho,<br>
            Har subah tera paigam ho.
        </div>

        <div class="post-actions">
            <button>❤️ 95</button>
            <button>💬 15</button>
            <button>📤 Share</button>
        </div>

    </div>

    <!-- Bottom Navigation -->

    <div class="bottom-nav">
        <a href="home.html">Home</a>
        <a href="account.html" class="active">My Profile</a>
    </div>

</body>
</html>
