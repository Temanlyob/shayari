<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shayroo - Login</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo">Shayroo</div>
    </div>

    <!-- Login Container -->

    <div class="login-container">

        <h1>Welcome to Shayroo</h1>

        <p class="subtitle">
            Share your shayari with the world
        </p>

        <!-- Google Login -->

        <button class="google-btn" onclick="googleLogin()">
            Continue with Google
        </button>

        <!-- Facebook -->

        <button class="facebook-btn">
            Continue with Facebook
        </button>

        <div class="divider">
            <span>OR</span>
        </div>

        <!-- Email -->

        <input
            id="email"
            type="email"
            placeholder="Email Address"
            class="input-field"
        >

        <!-- Password -->

        <input
            id="password"
            type="password"
            placeholder="Password"
            class="input-field"
        >

        <!-- Login -->

        <button
            class="login-btn"
            onclick="loginUser()">
            Log In
        </button>

        <!-- Forgot Password -->

        <a
            href="#"
            class="forgot-password"
            onclick="resetPassword()">
            Forgot Password?
        </a>

        <!-- Signup -->

        <div class="signup-section">

            <p>
                Don't have an account?
            </p>

            <button
                class="signup-btn"
                onclick="signupUser()">
                Sign Up
            </button>

        </div>

    </div>

    <!-- Bottom Navigation -->

    <div class="bottom-nav">
        <a href="home.html">Home</a>
        <a href="profile.html" class="active">My Profile</a>
    </div>

    <!-- Firebase Auth -->

    <script type="module" src="auth.js"></script>

</body>
</html>
