<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Shayari - Shayroo</title>
<link rel="stylesheet" href="new-post.css">
</head>
<body>

<div class="top-bar">
    <div class="logo">New Shayari</div>
</div>

<div class="container">

    <textarea
        class="shayari-box"
        placeholder="Write your shayari here..."
    ></textarea>

    <select class="category">
        <option>Love</option>
        <option>Sad</option>
        <option>Motivational</option>
        <option>Friendship</option>
        <option>Life</option>
        <option>Attitude</option>
    </select>

    <input
        type="text"
        class="hashtags"
        placeholder="#love #sad #shayari"
    >

    <input
        type="file"
        class="image-upload"
    >

    <button class="post-btn">
        Post Shayari
    </button>

</div>

</body>
</html>
